<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1480">
<title>Maztech Dashboard</title>
<link rel="icon" type="image/png" href="assets/logo-badge.png">
<link rel="stylesheet" href="Maztech Dashboard.css">
<style>
  /* Inline extras for app-specific bits not in main css */
  .filter-tabs { display:inline-flex; background: var(--bg-2); border: 1px solid var(--line-2); border-radius: var(--r-pill); padding: 3px; gap: 2px; }
  .filter-tabs .ft { font-family: var(--font-sans); font-weight: 500; font-size: 11px; padding: 5px 12px; border-radius: var(--r-pill); color: var(--fg-3); cursor:pointer; background: transparent; border:none; letter-spacing: 0.02em; }
  .filter-tabs .ft.on { background: var(--amber-500); color: var(--brand-fg); font-weight: 600; }
  .filter-tabs .ft:not(.on):hover { color: var(--fg-1); }

  .alert-card { background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 12px; transition: all 160ms; }
  .alert-card:hover { border-color: var(--warn); }

  .cust-row { display:flex; align-items:center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-1); }
  .cust-row:last-child { border-bottom: none; }
  .top-row { display:flex; align-items:center; gap: 10px; }
  .top-row .rank { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); font-weight: 600; width: 24px; }
  .avatar.cyan { background: linear-gradient(135deg, var(--cyan-400), var(--cyan-600)); color: white; }
  .avatar.purple { background: linear-gradient(135deg, #A78BFA, #6D28D9); color: white; }

  .today-row { display:flex; align-items:center; gap: 10px; padding: 8px 10px; border-radius: var(--r-md); background: var(--bg-1); border: 1px solid var(--line-1); }
  .time-chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 8px; background: var(--bg-3); border-radius: var(--r-sm); color: var(--amber-300); font-weight: 600; }
  .dot-status { width: 8px; height: 8px; border-radius: 50%; }
  .dot-status.amber { background: var(--amber-500); box-shadow: 0 0 6px var(--amber-glow); }
  .dot-status.cyan { background: var(--cyan-400); box-shadow: 0 0 6px var(--cyan-glow); }
  .dot-status.purple { background: #A78BFA; }
  .dot-status.success { background: var(--success); box-shadow: 0 0 6px var(--success); }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 260px; z-index: 100;
    background: linear-gradient(180deg, rgba(17,24,31,0.98), rgba(12,17,23,0.98));
    border: 1px solid var(--line-3); border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); backdrop-filter: blur(12px);
    animation: fade-up 260ms var(--ease-out);
  }
  .tweaks-head { display:flex; justify-content:space-between; align-items:center; padding: 12px 16px; border-bottom: 1px solid var(--line-2); font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--fg-1); }
  .tweaks-close { background: none; border: none; color: var(--fg-3); font-size: 20px; cursor: pointer; line-height: 1; }
  .tweaks-close:hover { color: var(--fg-1); }
  .tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }
  .tweak-section { display:flex; flex-direction:column; gap: 6px; }
  .tweak-label { font-family: var(--font-sans); font-weight: 600; font-size: 10px; letter-spacing: 0.14em; color: var(--fg-3); text-transform: uppercase; }
  .tweak-segs { display:inline-flex; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 2px; gap: 2px; }
  .tweak-segs .ts { flex:1; font-family: var(--font-sans); font-size: 11px; padding: 5px 8px; border-radius: 6px; color: var(--fg-3); border:none; background:transparent; cursor:pointer; text-transform: capitalize; }
  .tweak-segs .ts.on { background: var(--amber-500); color: var(--brand-fg); font-weight: 600; }
  .switch { width: 40px; height: 22px; background: var(--bg-3); border: 1px solid var(--line-2); border-radius: 999px; position: relative; cursor:pointer; transition: all 160ms; }
  .switch.on { background: var(--amber-500); border-color: var(--amber-500); }
  .switch-knob { position:absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--fg-2); border-radius: 50%; transition: all 160ms; }
  .switch.on .switch-knob { left: 20px; background: var(--brand-fg); }

  /* Light theme */
  body[data-theme="light"] .tbl tbody tr:hover { background: rgba(255,138,0,0.05); }

  /* ─── Finance: ledger summary ───────────────────────────── */
  .ledger-summary { display:flex; flex-direction:column; gap: 10px; }
  .ledger-row { display:flex; justify-content:space-between; align-items:center; padding: 12px 14px; border-radius: var(--r-md); background: var(--bg-1); border: 1px solid var(--line-1); }
  .ledger-row.in { border-left: 3px solid var(--success); }
  .ledger-row.out { border-left: 3px solid var(--danger); }
  .ledger-row.net { border-left: 3px solid var(--amber-500); background: linear-gradient(180deg, rgba(255,138,0,0.06), transparent); }
  .ledger-eyebrow { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ledger-amt { font-family: var(--font-mono); font-size: 20px; font-weight: 600; margin-top: 4px; font-feature-settings: "tnum" 1; }
  .ledger-amt.up { color: var(--success); }
  .ledger-amt.down { color: var(--danger); }
  .ledger-count { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }

  /* Highlight newly-added row */
  .row-new { animation: row-flash 1800ms var(--ease-out); }
  @keyframes row-flash {
    0% { background: rgba(255,138,0,0.18); }
    100% { background: transparent; }
  }

  /* ─── Modal ───────────────────────────────────────────── */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(7,11,20,0.72);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fade-in 200ms var(--ease-out);
  }
  .modal {
    width: 540px; max-width: 92vw;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line-3);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    animation: modal-in 320ms var(--ease-out);
  }
  @keyframes modal-in {
    0% { opacity: 0; transform: translateY(20px) scale(0.97); }
    100% { opacity: 1; transform: none; }
  }
  @keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
  .modal-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 22px 24px 14px; border-bottom: 1px solid var(--line-1);
  }
  .modal-close {
    background: var(--bg-3); border: 1px solid var(--line-2); border-radius: 50%;
    width: 32px; height: 32px; color: var(--fg-2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
    transition: all 160ms;
  }
  .modal-close:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
  .modal-body { padding: 18px 24px; display: flex; flex-direction: column; gap: 18px; }
  .modal-foot {
    padding: 14px 24px; border-top: 1px solid var(--line-1);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg-1); border-radius: 0 0 var(--r-xl) var(--r-xl);
  }
  .modal-preview { display: flex; flex-direction: column; gap: 2px; }
  .preview-amt { font-family: var(--font-mono); font-size: 18px; font-weight: 600; font-feature-settings: "tnum" 1; }
  .preview-amt.in  { color: var(--success); }
  .preview-amt.out { color: var(--danger); }

  /* Form bits */
  .form-row { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-3); }
  .text-input {
    background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r-md);
    padding: 10px 12px; color: var(--fg-1); font-family: var(--font-sans); font-size: 14px;
    transition: all 160ms; outline: none;
  }
  .text-input:focus { border-color: var(--amber-400); box-shadow: 0 0 0 3px rgba(255,138,0,0.18); }
  .text-input::placeholder { color: var(--fg-4); }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tt {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 16px; border-radius: var(--r-md); border: 1px solid var(--line-2);
    background: var(--bg-1); color: var(--fg-2); cursor: pointer; font-family: var(--font-sans);
    font-weight: 600; font-size: 14px; transition: all 160ms;
  }
  .tt-icon { font-family: var(--font-mono); font-size: 18px; line-height: 1; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1.5px solid currentColor; }
  .tt:hover { border-color: var(--line-3); color: var(--fg-1); }
  .tt.in.on  { border-color: var(--success); background: var(--success-bg); color: var(--success); box-shadow: 0 0 16px rgba(34,197,94,0.25); }
  .tt.out.on { border-color: var(--danger);  background: var(--danger-bg);  color: var(--danger);  box-shadow: 0 0 16px rgba(239,68,68,0.25); }

  .amt-wrap { position: relative; display: flex; align-items: center; }
  .amt-currency { position: absolute; left: 16px; font-family: var(--font-mono); font-size: 24px; color: var(--fg-3); font-weight: 500; }
  .amt-input {
    width: 100%; padding: 16px 16px 16px 44px;
    background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r-md);
    color: var(--fg-1); font-family: var(--font-mono); font-size: 28px; font-weight: 600;
    font-feature-settings: "tnum" 1; outline: none; transition: all 160ms;
  }
  .amt-input::-webkit-outer-spin-button,
  .amt-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .amt-input.in:focus  { border-color: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
  .amt-input.out:focus { border-color: var(--danger);  box-shadow: 0 0 0 3px rgba(239,68,68,0.18); }

  .quick-amts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .qa {
    font-family: var(--font-mono); font-size: 11px; padding: 5px 10px;
    background: var(--bg-3); border: 1px solid var(--line-2); border-radius: var(--r-pill);
    color: var(--fg-2); cursor: pointer; transition: all 140ms;
  }
  .qa:hover { background: var(--amber-500); color: var(--brand-fg); border-color: var(--amber-500); }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--font-sans); font-size: 12px; padding: 6px 12px;
    background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r-pill);
    color: var(--fg-2); cursor: pointer; transition: all 140ms;
  }
  .chip:hover { border-color: var(--line-3); color: var(--fg-1); }
  .chip.on {
    background: var(--amber-500); color: var(--brand-fg); border-color: var(--amber-500);
    box-shadow: 0 0 12px var(--amber-glow);
  }

  /* ─── Toast ───────────────────────────────────────────── */
  .toast-finance {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line-3); border-radius: var(--r-lg);
    padding: 12px 18px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow-lg); z-index: 300;
    animation: toast-in 380ms var(--ease-spring);
  }
  @keyframes toast-in {
    0%   { opacity: 0; transform: translate(-50%, 20px); }
    100% { opacity: 1; transform: translate(-50%, 0); }
  }
  .toast-dot { width: 10px; height: 10px; border-radius: 50%; }
  .toast-dot.in  { background: var(--success); box-shadow: 0 0 10px var(--success); }
  .toast-dot.out { background: var(--danger);  box-shadow: 0 0 10px var(--danger); }

  /* ─── Slip upload / dropzone ─────────────────────────── */
  .dropzone {
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    padding: 26px 16px; border-radius: var(--r-md);
    background: var(--bg-1); border: 1.5px dashed var(--line-2);
    color: var(--fg-3); cursor: pointer; transition: all 180ms;
    text-align: center;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--amber-400); background: rgba(255,138,0,0.04);
    color: var(--amber-300); box-shadow: 0 0 0 3px rgba(255,138,0,0.10);
  }
  .dz-title { font-family: var(--font-sans); font-size: 13px; font-weight: 500; }
  .dz-sub { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.02em; }

  .slip-preview { display:flex; flex-direction:column; gap:0;
    border: 1px solid var(--line-2); border-radius: var(--r-md); overflow:hidden; background: var(--bg-1);
    animation: fade-in 220ms var(--ease-out); }
  .slip-preview img { width: 100%; max-height: 220px; object-fit: contain; background: #000; }
  .slip-meta { display:flex; align-items:center; gap:10px; padding: 10px 12px; border-top: 1px solid var(--line-1); color: var(--fg-2); }
  .slip-name { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg-1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .slip-sub { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top:2px; }
  .slip-remove { background: var(--bg-3); border: 1px solid var(--line-2); width: 28px; height: 28px;
    border-radius: 50%; color: var(--fg-3); cursor: pointer; display:flex; align-items:center; justify-content:center; transition: all 140ms; }
  .slip-remove:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  /* Thumb in the table */
  .slip-thumb { position: relative; width: 36px; height: 36px; border-radius: var(--r-sm); overflow: hidden;
    border: 1px solid var(--line-2); cursor: pointer; padding: 0; background: var(--bg-1); transition: all 140ms; }
  .slip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slip-thumb:hover { border-color: var(--amber-400); transform: scale(1.06); box-shadow: 0 0 0 3px rgba(255,138,0,0.18); }
  .slip-thumb-badge { position:absolute; bottom: -1px; right: -1px; background: var(--amber-500); color: var(--brand-fg);
    width: 14px; height: 14px; border-radius: 50%; display:flex; align-items:center; justify-content:center; border: 1.5px solid var(--bg-2); }

  /* Slip viewer (lightbox) */
  .slip-viewer-scrim { position: fixed; inset:0; z-index: 250; background: rgba(7,11,20,0.86);
    backdrop-filter: blur(8px); display:flex; align-items:center; justify-content:center; padding: 40px;
    animation: fade-in 200ms var(--ease-out); }
  .slip-viewer { width: 620px; max-width: 96vw; max-height: 92vh;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--line-3); border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg); display:flex; flex-direction:column;
    animation: modal-in 320ms var(--ease-out); }
  .slip-viewer-head { display:flex; justify-content:space-between; align-items:flex-start;
    padding: 20px 22px; border-bottom: 1px solid var(--line-1); }
  .slip-viewer-body { flex:1; padding: 20px; background: #000; display:flex; align-items:center; justify-content:center; min-height: 0; }
  .slip-viewer-body img { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: var(--r-sm); }
  .slip-viewer-foot { display:flex; justify-content:space-between; align-items:center;
    padding: 12px 22px; border-top: 1px solid var(--line-1); background: var(--bg-1);
    border-radius: 0 0 var(--r-xl) var(--r-xl); }

  /* ─── P&L + Bank + Fixed + Dividend layout ─────────── */
  .grid-pl { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: stretch; }

  /* P&L */
  .pl-table { display:flex; flex-direction:column; gap: 8px; }
  .pl-row { display:grid; grid-template-columns: 1fr 90px 130px; align-items:center; gap: 12px; padding: 8px 4px; border-radius: var(--r-sm); transition: background 140ms; }
  .pl-row:hover { background: var(--bg-1); }
  .pl-label { font-family: var(--font-sans); font-size: 13px; color: var(--fg-2); }
  .pl-bar-wrap { height: 8px; background: var(--bg-1); border-radius: var(--r-pill); overflow: hidden; }
  .pl-bar { height: 100%; border-radius: var(--r-pill); transition: width 600ms var(--ease-out); }
  .pl-bar.rev   { background: linear-gradient(90deg, var(--amber-500), var(--amber-300)); box-shadow: 0 0 8px var(--amber-glow); }
  .pl-bar.cogs  { background: var(--danger); opacity: 0.7; }
  .pl-bar.gross { background: linear-gradient(90deg, var(--cyan-400), var(--cyan-200)); }
  .pl-bar.fixed { background: var(--danger); opacity: 0.55; }
  .pl-bar.var   { background: var(--danger); opacity: 0.45; }
  .pl-val { font-family: var(--font-mono); font-weight: 600; font-size: 13px; text-align: right; font-feature-settings: "tnum" 1; }
  .pl-val.pos { color: var(--fg-1); }
  .pl-val.neg { color: var(--danger); }
  .pl-row.rev .pl-val   { color: var(--amber-300); font-size: 14px; }
  .pl-row.gross .pl-val { color: var(--cyan-400); font-size: 14px; font-weight: 700; }
  .pl-row.gross .pl-label { color: var(--fg-1); font-weight: 600; }
  .pl-divider { height: 1px; background: var(--line-2); margin: 6px 0; }
  .pl-sub { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-top: 4px; padding: 0 4px; }
  .pl-net { display:flex; justify-content:space-between; align-items:center; padding: 14px 16px; border-radius: var(--r-md); background: linear-gradient(180deg, rgba(34,197,94,0.08), transparent); border-left: 3px solid var(--success); margin-top: 4px; }
  .pl-net-ring {
    width: 72px; height: 72px; border-radius: 50%;
    background: conic-gradient(var(--success) calc(var(--p) * 3.6deg), var(--bg-3) 0);
    display:flex; align-items:center; justify-content:center;
  }
  .pl-net-ring-val { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-2);
    display:flex; align-items:center; justify-content:center; font-family: var(--font-mono);
    font-size: 14px; font-weight: 600; color: var(--success); }

  /* Bank accounts */
  .bank-total { display:flex; justify-content:space-between; align-items:center; padding: 14px 16px; border-radius: var(--r-md); background: linear-gradient(180deg, rgba(255,138,0,0.08), transparent); border-left: 3px solid var(--amber-500); }
  .bank-card { display:flex; align-items:center; gap: 12px; padding: 12px; border-radius: var(--r-md); background: var(--bg-1); border: 1px solid var(--line-2); transition: all 160ms; }
  .bank-card:hover { border-color: var(--line-3); transform: translateY(-1px); }
  .bank-badge { width: 44px; height: 44px; border-radius: var(--r-sm); display:flex; align-items:center; justify-content:center; color: white; font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.04em; box-shadow: inset 0 1px 0 rgba(255,255,255,0.15); }

  /* Fixed costs */
  .fixed-row { display:flex; align-items:center; gap: 12px; padding: 10px 12px; border-radius: var(--r-md); background: var(--bg-1); border: 1px solid var(--line-1); }
  .fixed-ico { width: 36px; height: 36px; border-radius: var(--r-sm); border: 1.5px solid currentColor; display:flex; align-items:center; justify-content:center; flex-shrink:0; background: rgba(255,138,0,0.04); }
  .fixed-bar { height: 4px; background: var(--bg-3); border-radius: var(--r-pill); overflow: hidden; margin-top: 6px; }
  .fixed-bar-fill { height: 100%; border-radius: var(--r-pill); transition: width 600ms var(--ease-out); }

  /* Dividend */
  .dividend-hero { display:flex; justify-content:space-between; align-items:center; padding: 14px 16px; border-radius: var(--r-md); background: linear-gradient(180deg, rgba(255,138,0,0.08), transparent); border-left: 3px solid var(--amber-500); }
  .partner-row { display:flex; align-items:center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--line-1); }
  .partner-row:last-child { border-bottom: none; }
  .partner-avatar { width: 36px; height: 36px; border-radius: 50%; display:flex; align-items:center; justify-content:center; color: white; font-family: var(--font-display); font-weight: 700; font-size: 12px; flex-shrink:0; }
  .partner-bar { height: 4px; background: var(--bg-3); border-radius: var(--r-pill); overflow: hidden; margin-top: 6px; max-width: 200px; }
  .partner-bar-fill { height: 100%; border-radius: var(--r-pill); transition: width 600ms var(--ease-out); }

  /* Dividend % selector */
  .div-pct { padding: 12px; border-radius: var(--r-md); background: var(--bg-1); border: 1px solid var(--line-2); }
  .div-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: var(--bg-3); border-radius: var(--r-pill); outline: none; }
  .div-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--amber-500); cursor: pointer; box-shadow: 0 0 12px var(--amber-glow), 0 0 0 4px rgba(255,138,0,0.18); transition: transform 140ms; }
  .div-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
